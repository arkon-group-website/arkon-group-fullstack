<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Pearl and gold Saudi engineering skyline</title>
  <desc id="desc">A premium light corporate skyline scene with navy towers, gold command-center arcs, and infrastructure lines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".48" stop-color="#f7f6f2"/>
      <stop offset="1" stop-color="#efe7d6"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#173b63"/>
      <stop offset=".55" stop-color="#0f2b46"/>
      <stop offset="1" stop-color="#07192b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".82"/>
      <stop offset=".4" stop-color="#9db5c9" stop-opacity=".48"/>
      <stop offset="1" stop-color="#0f2b46" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset=".55" stop-color="#c79a3b" stop-opacity=".78"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".2"/>
    </linearGradient>
    <radialGradient id="sun" cx="68%" cy="31%" r="31%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".15" stop-color="#e3c27a" stop-opacity=".78"/>
      <stop offset=".5" stop-color="#e3c27a" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f2b46" flood-opacity=".18"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#173b63" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#sky)"/>
